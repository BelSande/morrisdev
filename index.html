<!doctype html>
<html lang="en-UK">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Dance builder</title>
    <link rel="stylesheet" href="style.css" />
	<link rel="manifest" href="manifest.json" />
	<link rel="icon" href="appstore-images/android/launchericon-48x48.png" />
  </head>
  <body>
    <h1>Dance builder</h1>
    <form>
      <fieldset>
        <legend>Select dancers</legend>
        <p>
          <label for="start-date">Start date</label>
          <input type="date" id="start-date" required />
        </p>
        <p>
          <label for="end-date">End date</label>
          <input type="date" id="end-date" required />
        </p>
      </fieldset>
      <p>
        <button type="submit">Add dancers</button>
      </p>
    </form>
    <section id="past-dances"></section>
    <script src="app.js" defer></script>
  </body>
</html>
